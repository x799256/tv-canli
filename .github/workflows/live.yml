name: 24/7 M3U Canlı Kanal Yeniləyici

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
    - name: Kodu Yüklə
      uses: actions/checkout@v3

    - name: Python Sazla
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Lazımi Alətləri Yüklə
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp

    - name: Canlı Yayım Linkini Çıxart və Hazırla
      run: |
        current_seconds=$(date +%s)
        video_index=$(( (current_seconds / 300) % 3 ))

        # ⚠️ BURA REALLIQDA KOPYALADIĞIN YOUTUBE LINKINI QOYURSAN:
        if [ $video_index -eq 0 ]; then
          raw_url="https://www.youtube.com/watch?v=ChS5CcxbXlc"
        elif [ $video_index -eq 1 ]; then
          raw_url="https://www.youtube.com/watch?v=PWFKYZ9cbis"
        else
          raw_url="https://www.youtube.com/watch?v=c6-nkNe2W2I"
        fi

        # yt-dlp vasitəsilə YouTube-dan birbaşa işlək m3u8 linkini alırıq
        m3u8_direct_url=$(yt-dlp -g -f best "$raw_url" || echo "")

        if [ -z "$m3u8_direct_url" ]; then
          echo "YouTube linki oxunmadı, ehtiyat link qoyulur."
          m3u8_direct_url="https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8"
        fi

        # Əsas M3U pleylist faylını yaradırıq
        echo "#EXTM3U" > playlist.m3u
        echo "#EXTINF:-1, Mənim 24/7 Canlı Kanalım" >> playlist.m3u
        echo "$m3u8_direct_url" >> playlist.m3u

    - name: Dəyişiklikləri GitHub-a Göndər
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add playlist.m3u
        git commit -m "Canlı yayın linki yeniləndi [skip ci]" || exit 0
        git push origin main
