name: 24/7 Canlı TV Yayımı

on:
  schedule:
    - cron: '0 */6 * * *' # Hər 6 saatdan bir virtual kompüteri təzələyir ki, yayın kəsilməsin
  workflow_dispatch: # Sənə yayımı əllə başladıb-söndürmək imkanı verir

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Virtual Kompüteri Hazırla
      uses: actions/checkout@v3

    - name: FFmpeg Video Proqramını Yüklə
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: 24/7 Yayımı Başlat
      run: |
        # 1. ÖZ REAL VİDEO LİNKLƏRİNİ BURA ARD-ARDA DÜZ
        # İstədiyin qədər video linki əlavə edə bilərsən
        echo "file 'http://movies.yt-hls.workers.dev/0Y_aBF8CDzQ.m3u8'" > playlist.txt
        echo "file 'http://movies.yt-hls.workers.dev/-JCIUhtLrlE.m3u8'" >> playlist.txt
        echo "file 'http://movies.yt-hls.workers.dev/AmgKXWUFNug.m3u8'" >> playlist.txt

        # FFmpeg proqramı videoları birləşdirir və canlı yayıma ötürür
        # Əgər Twitch istifadə edirsənsə, aşağıdakı rtmp linkini Twitch linki ilə dəyişə bilərsən
        ffmpeg -f concat -safe 0 -protocol_whitelist file,http,https,tcp,tls -i playlist.txt \
        -vcodec copy -acodec copy -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.STREAM_KEY }}"
