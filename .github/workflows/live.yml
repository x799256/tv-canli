name: 24/7 M3U Canlı Kanal Yeniləyici

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
    - name: Kodu Yüklə
      uses: actions/checkout@v3

    - name: Canlı Yayım Linkini Hazırla
      run: |
        current_seconds=$(date +%s)
        video_index=$(( (current_seconds / 300) % 3 ))

        # ⚠️ BURA REALLIQDA KOPYALADIĞIN ORIJINAL YOUTUBE LINKINI QOYURSAN:
        if [ $video_index -eq 0 ]; then
          raw_url="https://www.youtube.com/watch?v=ChS5CcxbXlc"
        elif [ $video_index -eq 1 ]; then
          raw_url="https://www.youtube.com/watch?v=PWFKYZ9cbis"
        else
          raw_url="https://www.youtube.com/watch?v=c6-nkNe2W2I"
        fi

        # Linkin içindən YouTube ID-sini avtomatik kəsən hissə
        if [[ "$raw_url" == *"v="* ]]; then
          video_id=$(echo "$raw_url" | sed -n 's/.*v=\([^&]*\).*/\1/p')
        elif [[ "$raw_url" == *"youtu.be/"* ]]; then
          video_id=$(echo "$raw_url" | sed 's/.*youtu.be\///' | cut -d'?' -f1)
        else
          video_id="ChS5CcxbXlc"
        fi

        # ID-ni birbaşa SƏNİN işlək worker linkinə birləşdiririk
        m3u8_direct_url="http://movies.yt-hls.workers.dev/${video_id}.m3u8"

        # Əsas M3U pleylist faylını yaradırıq (Pleyer məhz bu faylı oxuyacaq)
        echo "#EXTM3U" > playlist.m3u
        echo "#EXTINF:-1, Mənim 24/7 Canlı Kanalım" >> playlist.m3u
        echo "$m3u8_direct_url" >> playlist.m3u

    - name: Dəyişiklikləri GitHub-a Göndər
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add playlist.m3u
        git commit -m "Canlı yayın linki yeniləndi [skip ci]" || exit 0
        git push origin main
